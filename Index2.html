<!DOCTYPE html>
<html lang="eng">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Order Menu</title>
        <style>
            * {
                box-sizing:border-box;
            }
            body {
                background-color:#f5f5f7;
                color:#1d1d1f;
                font-family:'Courier New', Courier, monospace;
                margin: 50px;
            }
            h1 {
                font-size: 30px;
                font-weight: 100px;
                margin: 0 0 20px;                
            }
  span {
                display:block;
                margin-bottom: 20px;
                padding: 15px;
                border: 5px solid #7f0fe7;
                border-radius: 15px;
                color: #050202;
                font-width: 30px;
                font-size: 20px;
            }
            span:nth-child(odd)
            {
                background-color:#75b95a;
            }
            span:nth-child(even)
            {
                background-color:#827ea8;
            }
        </style>
    </head>
    <body>
        <h1>Breakfast Menu</h1>
        <div>
            <span>Paratha</span>
            <span>Fried Egg</span>
            <span>Omelette</span>
            <span>Vegetable Curry</span>
            <span>Khicuri</span>
            <span>Puri</span>
            <span>Tea</span>
            <span>Coffee</span>
        </div>
    </body>
</html>
